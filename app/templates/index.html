{% extends "base.html" %}
{% block content %}
<p class="section-label">Internal Tools</p>
<h2>Available Tools ({{ scripts|length }})</h2>
{% if scripts %}
<div class="script-list">
    {% for s in scripts %}
    <a href="/tools/{{ s.id }}" class="script-card tool-link">
        <div class="script-info">
            <h3>{{ s.name }}</h3>
            <p>{{ s.description }}</p>
        </div>
        <span class="run-btn">Open</span>
    </a>
    {% endfor %}
</div>
{% else %}
<p class="empty">No tools found.</p>
{% endif %}
{% endblock %}
