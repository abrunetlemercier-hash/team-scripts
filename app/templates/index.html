{% extends "base.html" %}
{% block content %}
<p class="section-label">Internal Tools</p>
<h2>Available Tools ({{ tools|length }})</h2>
{% if tools %}
<div class="script-list">
    {% for tool in tools %}
    <a href="/tools/{{ tool.id }}" class="script-card tool-link">
        <div class="script-info">
            <h3>{{ tool.name }}</h3>
            <p>{{ tool.description }}</p>
        </div>
        <span class="run-btn">Open</span>
    </a>
    {% endfor %}
</div>
{% else %}
<p class="empty">No tools found.</p>
{% endif %}
{% endblock %}
